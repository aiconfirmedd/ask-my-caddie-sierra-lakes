<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b3d0b">
<title>Ask My Caddie — Sierra Lakes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: linear-gradient(160deg, #0b3d0b 0%, #0f5f1a 60%, #164d1c 100%);
    color: #f5f5f0;
    min-height: 100vh;
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
  }
  header { text-align: center; padding: 14px 0 6px; }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #e8f5d8; }
  header .sub { font-size: 11px; opacity: 0.7; margin-top: 2px; }
  .status-bar { display: flex; justify-content: space-between; align-items: center;
    background: rgba(0,0,0,0.25); border-radius: 14px; padding: 10px 14px; margin: 10px 0; font-size: 13px; }
  .gps-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; background: #f59e0b; }
  .gps-dot.ok { background: #22c55e; } .gps-dot.err { background: #ef4444; }
  .hole-card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 18px; padding: 14px 16px; margin-bottom: 12px; }
  .hole-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .hole-title { font-size: 12px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
  .hole-num { font-size: 46px; font-weight: 800; line-height: 1; color: #fff; }
  .hole-meta { font-size: 13px; opacity: 0.85; }
  select { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.25);
    border-radius: 10px; padding: 8px 10px; font-size: 14px; font-weight: 600; }
  select option { background: #0b3d0b; color: #fff; }
  .score-row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
  .score-ctrl { display: flex; align-items: center; gap: 14px; }
  .score-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: #fff; font-size: 22px; font-weight: 700; cursor: pointer; }
  .score-btn:active { background: rgba(255,255,255,0.3); }
  .score-val { font-size: 28px; font-weight: 800; min-width: 30px; text-align: center; }
  .score-total { font-size: 13px; opacity: 0.75; text-align: right; }
  .score-total b { font-size: 18px; color: #fff; display: block; }
  .mic-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 0; }
  .mic-btn { width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #f9fafb, #d4d4d4 70%, #a3a3a3);
    border: 6px solid rgba(255,255,255,0.85);
    box-shadow: 0 10px 40px rgba(0,0,0,0.45), 0 0 0 0 rgba(34,197,94,0.6);
    display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s; position: relative; }
  .mic-btn:active { transform: scale(0.96); }
  .mic-btn.listening { background: radial-gradient(circle at 30% 30%, #fca5a5, #dc2626 70%, #991b1b); animation: pulse 1.2s ease-out infinite; }
  .mic-btn.speaking { background: radial-gradient(circle at 30% 30%, #86efac, #22c55e 70%, #15803d); }
  @keyframes pulse {
    0% { box-shadow: 0 10px 40px rgba(0,0,0,0.45), 0 0 0 0 rgba(220,38,38,0.7); }
    100% { box-shadow: 0 10px 40px rgba(0,0,0,0.45), 0 0 0 30px rgba(220,38,38,0); }
  }
  .mic-icon { width: 80px; height: 80px; }
  .mic-label { margin-top: 14px; font-size: 15px; opacity: 0.9; letter-spacing: 0.5px; text-align: center; }
  .reply-box { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px;
    padding: 16px 18px; margin: 12px 0; min-height: 72px; font-size: 17px; line-height: 1.35; color: #f0fdf4; }
  .reply-box .you { font-size: 12px; opacity: 0.6; margin-bottom: 4px; font-style: italic; }
  .reply-box .caddie { font-weight: 600; }
  .footer-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .action-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: #fff;
    padding: 14px 12px; border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; }
  .action-btn:active { background: rgba(255,255,255,0.22); }
  .action-btn .ic { display: block; font-size: 22px; margin-bottom: 4px; }
  .end-round { background: rgba(220,38,38,0.3); border: 1px solid rgba(220,38,38,0.6); color: #fff;
    padding: 11px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; margin-bottom: 8px; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px);
    z-index: 100; display: none; padding: 20px; overflow-y: auto; }
  .modal-bg.show { display: block; }
  .modal { background: #0f2f10; border-radius: 20px; padding: 20px; color: #fff; max-width: 600px; margin: 20px auto; border: 1px solid rgba(255,255,255,0.2); }
  .modal h2 { font-size: 20px; margin-bottom: 14px; }
  .modal h3 { font-size: 14px; opacity: 0.8; margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 1px; }
  .modal .close { float: right; background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
  .timeline-item { background: rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; }
  .timeline-item .ts { font-size: 11px; opacity: 0.6; }
  .timeline-item .h { color: #86efac; font-weight: 700; }
  .timeline-item.shot { border-left: 3px solid #fbbf24; }
  .timeline-item.rec { border-left: 3px solid #60a5fa; }
  .grid-score { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; font-size: 11px; text-align: center; margin-top: 6px; }
  .grid-score div { padding: 6px 2px; background: rgba(255,255,255,0.08); border-radius: 6px; }
  .grid-score .h { font-weight: 700; background: rgba(0,0,0,0.3); }
  .grid-score .par3 { background: rgba(96,165,250,0.15); }
  .grid-score .par5 { background: rgba(251,146,60,0.15); }
  .logging { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column;
    align-items: center; justify-content: center; z-index: 200; color: #fff; text-align: center; padding: 30px; }
  .logging.show { display: flex; }
  .logging .ring { width: 140px; height: 140px; border: 6px solid rgba(220,38,38,0.5); border-top-color: #dc2626; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85);
    color: #fff; padding: 10px 16px; border-radius: 10px; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 300; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>

  <header>
    <h1>Ask My Caddie</h1>
    <div class="sub">Sierra Lakes Golf Club · Fontana, CA</div>

  <div class="hole-card">

      </div>
      <div>

          <option value="auto">Auto</option>
        </select>
      </div>
    </div>
    <div class="score-row">
      <div class="score-ctrl">

    <div class="mic-label" id="micLabel">Tap and speak</div>

  <div class="reply-box" id="replyBox">

  <div class="footer-row">

    <button class="action-btn" id="summaryBtn"><span class="ic">📋</span>Round Summary</button>
  </div>
  <button class="end-round" id="endRoundBtn">End Round &amp; Start Fresh</button>
  <div class="modal-bg" id="summaryModal">
    <div class="modal">
      <button class="close" id="closeSummary">Close</button>
      <h2>Round Summary</h2>
      <div id="summaryMeta"></div>
      <h3>Scorecard</h3>
      <div id="scoreGrid"></div>
      <h3>Timeline</h3>
      <div id="timelineBox"></div>
    </div>
  </div>
  <div class="logging" id="loggingOverlay">

    <div id="logHint" style="margin-top:10px;opacity:0.7;font-size:14px;">Describe your shot and tap anywhere to stop</div>
  </div>

function toRad(d){ return d*Math.PI/180; } function toDeg(r){ return r*180/Math.PI; }

function generateReply(transcript,hole,gps,weather){
  const distToPin=haversineYd(gps,hole.pin);
  const distToTee=haversineYd(gps,hole.tee);
  const onTee=distToTee<35;
  const nearGreen=distToPin<40;
  const t=(transcript||'').toLowerCase();
  const hazards=nearestHazards(hole,gps).filter(h=>h.dist_to_pin_yd<distToPin+10);
  const wind=windEffect(hole,weather);
  if(/clear|carry|over the/.test(t)){
    const b=hazards.find(h=>/bunker/i.test(h.type) && h.position!=='greenside');
    const w=hazards.find(h=>/water/i.test(h.type));
    const target=w||b;
    if(target){ const dHaz=haversineYd(gps,{lat:target.lat,lon:target.lon}); const carry=dHaz+8; return carry+' to carry the '+(target.type==='water_hazard'?'water':'bunker')+', play it firm.'; }
  }
  if(onTee){
    const teeYd=hole.white_yd;
    const doglegHaz=hole.hazards.find(h=>h.position==='fairway');
    let parts=[teeYd+' to the pin'];
    if(hole.par===3){
      const gs=hole.hazards.find(h=>h.position==='greenside');
      if(gs) parts.push((gs.type==='water_hazard'?'water':'bunker')+' '+(gs.side==='center'?'front':gs.side));
      else parts.push('aim center');
    } else {
      if(doglegHaz) parts.push('aim '+(doglegHaz.side==='left'?'right':'left')+' of the '+doglegHaz.side+' bunker at '+doglegHaz.dist_from_tee_yd);
      else parts.push('aim center fairway');
    }
    if(wind && wind.mph>=8) parts.push(wind.mph+' '+wind.label);
    return parts.join(', ')+'.';
  }
  if(nearGreen){
    const gs=hazards.filter(h=>h.position==='greenside');
    let reply=distToPin+' to the pin';
    if(gs[0]) reply+=', '+(gs[0].type==='water_hazard'?'water':'bunker')+' '+(gs[0].side==='center'?'short':gs[0].side);
    else reply+=', clean look';
    if(wind && wind.mph>=10) reply+=', '+wind.mph+' '+wind.label;
    return reply+'.';
  }
  let parts=[distToPin+' to the pin'];
  const gs=hazards.find(h=>h.position==='greenside');
  const approach=hazards.find(h=>h.position==='approach');
  if(gs){
    const side=gs.side==='center'?'front':gs.side;
    parts.push(gs.type==='water_hazard'?('water '+side+' at '+gs.dist_to_pin_yd):('bunker '+side+' at '+gs.dist_to_pin_yd));
  } else if(approach){
    const myToApproach=haversineYd(gps,{lat:approach.lat,lon:approach.lon});
    parts.push((approach.type==='water_hazard'?'water':'bunker')+' at '+myToApproach);
  }
  if(wind && wind.mph>=8) parts.push(wind.mph+' '+wind.label);
  if(/aim|play|line|strategy|best play|what should/i.test(t)){
    const leftCount=hazards.filter(h=>h.side==='left').length;
    const rightCount=hazards.filter(h=>h.side==='right').length;
    if(rightCount>leftCount && rightCount>0) parts.splice(1,0,'aim center-left');
    else if(leftCount>rightCount && leftCount>0) parts.splice(1,0,'aim center-right');
    else parts.splice(1,0,'aim center');
  }
  return parts.join(', ')+'.';
}
function speak(text){ if(!('speechSynthesis' in window)) return; window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=1.05; u.pitch=0.95; u.volume=1.0; const voices=window.speechSynthesis.getVoices(); const pref=voices.find(v=>/en[-_]us/i.test(v.lang) && /male|daniel|alex|fred/i.test(v.name))||voices.find(v=>/en[-_]us/i.test(v.lang))||voices[0]; if(pref) u.voice=pref; $('micBtn').classList.add('speaking'); u.onend=function(){ $('micBtn').classList.remove('speaking'); }; u.onerror=function(){ $('micBtn').classList.remove('speaking'); }; window.speechSynthesis.speak(u); }

function renderHole(){

  $('holeNum').textContent=h.hole;
  $('holeMeta').textContent='Par '+h.par+' · '+h.white_yd+' yd · HCP '+h.hcp;
  const score=state.scores[h.hole]||0;
  $('scoreVal').textContent=score;
  let total=0,played=0,parSum=0;
  for(const k in state.scores){ const s=state.scores[k]; if(s>0){ total+=s; const hh=COURSE.holes.find(x=>x.hole===parseInt(k)); if(hh)parSum+=hh.par; played++; } }
  const rel=total-parSum;

function setHole(num,manual){ state.curHole=num; if(manual){ state.autoHole=false; $('holePick').value=String(num); } renderHole(); save(); }

    $('gpsText').textContent='GPS ±'+Math.round(pos.coords.accuracy)+'m';

async function askCaddie(){

  fetchWeather();
  const mic=$('micBtn'); mic.classList.add('listening'); $('micLabel').textContent='Listening…';

    rec.onresult=function(ev){ const transcript=ev.results[0][0].transcript; handleCaddieQuery(transcript); };

}
async function handleCaddieQuery(transcript){

  const gps=state.gps;
  const weather=await fetchWeather();
  const reply=generateReply(transcript,hole,gps,weather);
  const distToPin=haversineYd(gps,hole.pin);
  $('replyBox').innerHTML='<div class="you">You: '+escapeHTML(transcript)+'</div><div class="caddie">'+escapeHTML(reply)+'</div>';

function escapeHTML(s){ return String(s).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function logShot(){
  const rec=ensureRecognition(); if(!rec){ toast('Voice not supported.'); return; }
  const overlay=$('loggingOverlay'); overlay.classList.add('show');
  try{
    rec.onresult=function(ev){ const transcript=ev.results[0][0].transcript; state.shots.push({ hole:state.curHole, ts:new Date().toISOString(), transcript:transcript, lat:state.gps?state.gps.lat:null, lon:state.gps?state.gps.lon:null }); save(); overlay.classList.remove('show'); toast('Logged: '+transcript); };
    rec.onerror=function(e){ overlay.classList.remove('show'); if(e.error!=='no-speech') toast('Voice error: '+e.error); };
    rec.onend=function(){ overlay.classList.remove('show'); };
    rec.start();
    overlay.onclick=function(){ try{ rec.stop(); }catch(e){} };
  } catch(e){ overlay.classList.remove('show'); toast('Could not start mic'); }
}
function renderSummary(){
  const meta='Started '+new Date(state.roundStart).toLocaleString()+' · Round #'+state.roundId;
  $('summaryMeta').innerHTML='<div style="font-size:12px;opacity:0.7">'+meta+'</div>';
  function holeGridHTML(range){
    let out='<div class="grid-score"><div class="h">H</div>'+range.map(i=>'<div class="h">'+i+'</div>').join('')+'</div>';
    out+='<div class="grid-score"><div class="h">Par</div>'+range.map(i=>{ const h=COURSE.holes.find(x=>x.hole===i); const cls=h.par===3?'par3':(h.par===5?'par5':''); return '<div class="'+cls+'">'+h.par+'</div>'; }).join('')+'</div>';
    out+='<div class="grid-score"><div class="h">You</div>'+range.map(i=>{ const s=state.scores[i]||''; const h=COURSE.holes.find(x=>x.hole===i); const cls=h.par===3?'par3':(h.par===5?'par5':''); return '<div class="'+cls+'">'+s+'</div>'; }).join('')+'</div>';
    return out;
  }
  $('scoreGrid').innerHTML=holeGridHTML([1,2,3,4,5,6,7,8,9])+'<div style="height:8px"></div>'+holeGridHTML([10,11,12,13,14,15,16,17,18]);
  const tl=[].concat(state.shots.map(s=>Object.assign({},s,{kind:'shot'})), state.recs.map(r=>Object.assign({},r,{kind:'rec'}))).sort((a,b)=>a.ts.localeCompare(b.ts));
  if(tl.length===0){ $('timelineBox').innerHTML='<div style="opacity:0.6;font-size:13px">No shots or recommendations yet.</div>'; }
  else {
    $('timelineBox').innerHTML=tl.map(it=>{
      const t=new Date(it.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      if(it.kind==='shot') return '<div class="timeline-item shot"><span class="h">H'+it.hole+'</span> <span class="ts">'+t+'</span> — '+escapeHTML(it.transcript)+'</div>';
      return '<div class="timeline-item rec"><span class="h">H'+it.hole+'</span> <span class="ts">'+t+'</span> — <i>"'+escapeHTML(it.transcript)+'"</i><br>→ '+escapeHTML(it.reply)+'</div>';
    }).join('');
  }
  $('summaryModal').classList.add('show');
}
function buildHolePicker(){
  const sel=$('holePick');
  for(let i=1;i<=18;i++){ const h=COURSE.holes.find(x=>x.hole===i); const o=document.createElement('option'); o.value=String(i); o.textContent='Hole '+i+' · Par '+h.par; sel.appendChild(o); }
  sel.addEventListener('change', function(e){ const v=e.target.value; if(v==='auto'){ state.autoHole=true; save(); toast('Auto hole detection on'); } else { setHole(parseInt(v),true); toast('Locked to hole '+v); } });
  sel.value=state.autoHole?'auto':String(state.curHole);
}
function wire(){
  $('micBtn').addEventListener('click', askCaddie);
  $('logShotBtn').addEventListener('click', logShot);
  $('summaryBtn').addEventListener('click', renderSummary);
  $('closeSummary').addEventListener('click', function(){ $('summaryModal').classList.remove('show'); });
  $('scoreUp').addEventListener('click', function(){ state.scores[state.curHole]=(state.scores[state.curHole]||0)+1; renderHole(); save(); });
  $('scoreDown').addEventListener('click', function(){ state.scores[state.curHole]=Math.max(0,(state.scores[state.curHole]||0)-1); renderHole(); save(); });
  $('endRoundBtn').addEventListener('click', function(){
    if(!confirm('End this round and start a new one?')) return;
    const hist=JSON.parse(localStorage.getItem('askcaddie.history')||'[]');
    hist.push({ id:state.roundId, start:state.roundStart, end:new Date().toISOString(), scores:state.scores, shots:state.shots, recs:state.recs });
    localStorage.setItem('askcaddie.history', JSON.stringify(hist.slice(-30)));
    for(const k of Object.values(LS)) localStorage.removeItem(k);
    state = { roundId:null, roundStart:null, curHole:1, autoHole:true, gps:state.gps, weather:state.weather, lastWeatherFetch:state.lastWeatherFetch, scores:{}, shots:[], recs:[] };
    load(); renderHole();
    $('replyBox').innerHTML='<div class="caddie">New round started. Tap the mic.</div>';
    toast('New round');
  });
}
window.addEventListener('DOMContentLoaded', function(){
  load(); buildHolePicker(); wire(); renderHole(); watchGPS(); fetchWeather();
  if('speechSynthesis' in window){ window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged=function(){}; }
});
document.addEventListener('touchend', function(e){ if(e.target.tagName==='BUTTON') e.preventDefault(); }, {passive:false});
</script>
</body>
